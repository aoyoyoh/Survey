<script>
/* ════ RADAR ════ */
function drawRadar(scores){
  const cx=150,cy=155,r=90,n=5;
  const labels=['เงินสำรอง','ความคุ้มครอง','กระแสเงินสด','การออม/ลงทุน','การวางแผน'];
  const vals=[scores.emergency,scores.protection,scores.cashflow,scores.savings,scores.planning];
  const angle=i=>(Math.PI*2*i/n)-Math.PI/2;
  let grid='';
  for(let lv=1;lv<=5;lv++){
    const pts=Array.from({length:n},(_,i)=>{const a=angle(i),lr=r*lv/5;return`${cx+lr*Math.cos(a)},${cy+lr*Math.sin(a)}`;}).join(' ');
    grid+=`<polygon points="${pts}" fill="${lv===5?'rgba(0,35,102,.03)':'none'}" stroke="#E5E1D8" stroke-width="${lv===5?'1.5':'1'}"/>`;
  }
  let axes='';
  for(let i=0;i<n;i++){const a=angle(i);axes+=`<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(a)}" y2="${cy+r*Math.sin(a)}" stroke="#E5E1D8" stroke-width="1"/>`;}
  const pts=vals.map((v,i)=>{const a=angle(i),vr=r*(v/100);return`${cx+vr*Math.cos(a)},${cy+vr*Math.sin(a)}`;}).join(' ');
  const dots=vals.map((v,i)=>{const a=angle(i),vr=r*(v/100);return`<circle cx="${cx+vr*Math.cos(a)}" cy="${cy+vr*Math.sin(a)}" r="4" fill="#002366" stroke="#fff" stroke-width="2"/>`;}).join('');
  const LR=r+36;let lbls='';
  labels.forEach((lbl,i)=>{
    const a=angle(i),lx=cx+LR*Math.cos(a),ly=cy+LR*Math.sin(a);
    const anc=Math.cos(a)>0.15?'start':Math.cos(a)<-0.15?'end':'middle';
    const v=vals[i];const c=v>=70?'#2E7D32':v>=40?'#C8A94A':'#E05252';
    lbls+=`<text x="${lx}" y="${ly-5}" text-anchor="${anc}" font-size="10.5" fill="#7A7A8C" font-family="Sarabun,sans-serif" font-weight="600">${lbl}</text>`;
    lbls+=`<text x="${lx}" y="${ly+10}" text-anchor="${anc}" font-size="12" fill="${c}" font-family="Sarabun,sans-serif" font-weight="800">${v}</text>`;
  });
  return`<svg width="320" height="320" viewBox="-10 0 320 320" style="overflow:visible;display:block">${grid}${axes}<polygon points="${pts}" fill="rgba(0,35,102,.09)" stroke="#002366" stroke-width="2.5" stroke-linejoin="round"/>${dots}${lbls}</svg>`;
}

let S={screen:'welcome',currentQ:0,answers:{},archetype:null,radarScores:null,contactOpen:false,contactName:'',contactPhone:'',contactLine:''};

/* ════ SCORING ════ */
const KS={A:4,B:3,C:2,D:1,E:1};
function sc(qid){return KS[S.answers[qid]?.choice]||2;}
function pct(avg){return Math.round(15+(avg-1)/3*77);}

/* v4.1: Q4=emergency, Q5+Q6=protection, Q7+Q8=cashflow, Q9=savings, Q3+Q10=planning */
function calcRadar(){
  return{
    emergency: pct(sc('Q4')),
    protection:pct((sc('Q5')+sc('Q6'))/2),
    cashflow:  pct((sc('Q7')+sc('Q8'))/2),
    savings:   pct(sc('Q9')),
    planning:  pct((sc('Q3')+sc('Q10'))/2),
  };
}

function calcArchetype(){
  const prot=sc('Q5')+sc('Q6');
  const cf  =sc('Q7')+sc('Q8');
  const gr  =sc('Q9')+sc('Q10');
  if(prot<=4&&cf<=4&&gr<=4&&sc('Q4')<=2) return'emptyBento';
  if(cf<=4)                               return'tightDenim';
  if(gr>=7&&prot<=5)                      return'toppingHeavy';
  if(gr>=7&&sc('Q4')<=2)                  return'starvingManeki';
  if(gr>=7&&sc('Q6')<=2)                  return'tinyWagasa';
  if(sc('Q9')===2&&cf>=6)                 return'zenStone';
  if(sc('Q9')>=3&&sc('Q10')<=2)           return'lostTsuru';
  /* ── Fallback: ถ้าคะแนน radar เฉลี่ยต่ำกว่า 48 ไม่ควรได้ cozyMinka ── */
  const r=S.radarScores||{};
  const avgR=(r.emergency+r.protection+r.cashflow+r.savings+r.planning)/5;
  if(avgR<48) return'emptyBento';
  return'cozyMinka';
}

    {order:2,key:'emergency', icon:'🧯',label:'สร้างเงินสำรองฉุกเฉิน 3–6 เดือน', action:'แยกบัญชีออมทรัพย์ดอกเบี้ยสูง ตั้งโอนอัตโนมัติทุกเดือน'},
    {order:3,key:'protection',icon:'🛡️',label:'เสริมความคุ้มครองประกันสุขภาพ-ชีวิต',action:'ทบทวนวงเงินประกัน เป้าหมายทุนประกันชีวิต ≥ 10x รายได้/ปี'},
    {order:4,key:'savings',   icon:'🌱',label:'ออมอัตโนมัติและลงทุนอย่างเป็นระบบ',action:'Pay Yourself First ≥ 20% กระจายลงทุน SSF/RMF/กองทุน'},
    {order:5,key:'planning',  icon:'🎯',label:'วางแผนภาษีและเกษียณให้ครบสิทธิ์',  action:'ใช้สิทธิลดหย่อนครบทุกประเภท วางแผน RMF+กองทุนสำรองเลี้ยงชีพ'},
  ];
  return dims
    .map(d=>({...d,score:r[d.key]}))
    .sort((a,b)=>{
      const diff=a.score-b.score;
      if(Math.abs(diff)<10) return a.order-b.order;
      return diff;
    });
}

/* v4.1: health=Q5, life=Q6 */
function calcInsurance(){
  const h=S.answers['Q5']?.choice||'D';
  const l=S.answers['Q6']?.choice||'D';
  const healthMap={
    A:{status:'✅ ครบ',detail:'ประกันสุขภาพครอบคลุมดี',cls:'ins-ok'},
    B:{status:'⚠️ ต้องเสริม',detail:'มีสวัสดิการแต่ยังไม่เพียงพอ ควรเพิ่มประกันส่วนตัว',cls:'ins-warn'},
    C:{status:'❌ ไม่เพียงพอ',detail:'มีแค่ประกันสังคม/บัตรทอง ต้องเพิ่มความคุ้มครอง',cls:'ins-bad'},
    D:{status:'🚨 ไม่มี',detail:'ความเสี่ยงสูงมาก ต้องดำเนินการด่วน',cls:'ins-bad'},
  };
  const lifeMap={
    A:{status:'✅ ครบ',detail:'ทุนประกันชีวิตเพียงพอ ครอบครัวได้รับการคุ้มครอง',cls:'ins-ok'},
    B:{status:'⚠️ ต้องตรวจสอบ',detail:'มีประกันแต่ยังไม่แน่ใจว่าพอ ควรคำนวณทุนที่เหมาะสม',cls:'ins-warn'},
    C:{status:'❌ ไม่เพียงพอ',detail:'ทุนประกันน้อยกว่าที่ควร ครอบครัวยังมีความเสี่ยง',cls:'ins-bad'},
    D:{status:'🚨 ไม่มี',detail:'ยังไม่มีประกันชีวิต ต้องเริ่มทันที',cls:'ins-bad'},
  };
  const hd=healthMap[h]||healthMap['D'];
  const ld=lifeMap[l]||lifeMap['D'];
  let overall='';
  if(h==='A'&&l==='A') overall='ความคุ้มครองครบแล้ว ✅';
  else if(h==='D'||l==='D') overall='ต้องดำเนินการด่วน 🚨';
  else if(h==='C'||l==='C') overall='ต้องเสริมความคุ้มครองด่วน ❌';
  else overall='ต้องตรวจสอบและเสริมบางส่วน ⚠️';
  return{health:hd,life:ld,overall};
}

/* ════ SURPLUS CALCULATION ════ */
/* v4.1: income=Q11, surplus%=Q7 */
function calcSurplus(){
  const incQ=S.answers['Q11']?.choice||'B';

  const income=INCOME_MID[incQ]||45000;

}

const ARCH_EMOJI={
  toppingHeavy:'🍣',zenStone:'🪨',tightDenim:'👖',cozyMinka:'🏡',
  tinyWagasa:'☂️',starvingManeki:'🐱',lostTsuru:'🦢',emptyBento:'🍱'

/* draw radar on canvas */
function drawRadarCanvas(ctx,scores,cx,cy,R){
  const vals=[scores.emergency,scores.protection,scores.cashflow,scores.savings,scores.planning];
  const N=5;const step=2*Math.PI/N;const off=-Math.PI/2;
  [0.2,0.4,0.6,0.8,1].forEach(pct=>{
    ctx.beginPath();
    for(let i=0;i<N;i++){const a=off+i*step;const r=R*pct;i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));}
    ctx.closePath();ctx.strokeStyle=pct===1?'rgba(200,169,74,0.5)':'rgba(200,169,74,0.2)';ctx.lineWidth=1.5;ctx.stroke();
  });
  for(let i=0;i<N;i++){const a=off+i*step;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+R*Math.cos(a),cy+R*Math.sin(a));ctx.strokeStyle='rgba(200,169,74,0.25)';ctx.lineWidth=1;ctx.stroke();}
  ctx.beginPath();
  vals.forEach((v,i)=>{const r=R*(v/100);const a=off+i*step;i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));});
  ctx.closePath();ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fill();ctx.strokeStyle='#C8A94A';ctx.lineWidth=2.5;ctx.stroke();
  vals.forEach((v,i)=>{const r=R*(v/100);const a=off+i*step;ctx.beginPath();ctx.arc(cx+r*Math.cos(a),cy+r*Math.sin(a),7,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#C8A94A';ctx.lineWidth=2;ctx.stroke();});
}

/* rrect helper — canvas rounded rectangle */
function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

/* wrap Thai/EN centered text — returns next y */
function wrapTextCenter(ctx,text,cx,y,maxW,lineH){
  const words=text.split(' ');
  let line='';
  words.forEach((word,n)=>{
    const test=line+(line?' ':'')+word;
    if(ctx.measureText(test).width>maxW&&line!==''){
      ctx.fillText(line,cx,y);line=word;y+=lineH;
    } else {line=test;}
    if(n===words.length-1&&line) ctx.fillText(line,cx,y);
  });
  return y+lineH;
}

async function generateShareCard(){
  try{await document.fonts.load('800 56px Sarabun');await document.fonts.load('400 24px Sarabun');}catch(e){}
  const arch=ARCH[S.archetype];const r=S.radarScores;
  const C=document.createElement('canvas');C.width=1080;C.height=1080;
  const ctx=C.getContext('2d');

  /* ── Background: deep navy premium ── */
  const g=ctx.createLinearGradient(0,0,1080,1080);
  g.addColorStop(0,'#001228');g.addColorStop(0.5,'#001f48');g.addColorStop(1,'#001a3a');
  ctx.fillStyle=g;ctx.fillRect(0,0,1080,1080);

  /* ── Subtle gold dot grid ── */
  ctx.fillStyle='rgba(200,169,74,0.05)';
  for(let x=54;x<1080;x+=54)for(let y=54;y<1080;y+=54){ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fill();}

  /* ── Gold bars ── */
  ctx.fillStyle='#C8A94A';ctx.fillRect(0,0,1080,8);ctx.fillRect(0,1072,1080,8);

  /* ── Header ── */
  ctx.textAlign='center';
  ctx.fillStyle='rgba(200,169,74,0.95)';ctx.font='700 17px Sarabun,sans-serif';
  ctx.fillText('✦  SIGNATURE 41 FINANCIAL CLINIC  ✦',540,48);
  ctx.fillStyle='rgba(255,255,255,0.38)';ctx.font='400 13px Sarabun,sans-serif';
  ctx.fillText('Financial Health Check · CFP® Based',540,70);
  ctx.strokeStyle='rgba(200,169,74,0.28)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(80,86);ctx.lineTo(1000,86);ctx.stroke();

  /* ── LEFT: Archetype SVG — swap navy→white so it shows on dark bg ── */
  const svgStr=ASVG[arch.key]||'';
  const bigSvg=svgStr
    .replace(/width="\d+"/,'width="310"').replace(/height="\d+"/,'height="272"')
    .replace(/stroke="#002366"/g,'stroke="rgba(255,255,255,0.92)"')
    .replace(/fill="#002366"/g,'fill="rgba(255,255,255,0.92)"');
  await new Promise(res=>{
    try{
      const blob=new Blob([bigSvg],{type:'image/svg+xml'});
      const url=URL.createObjectURL(blob);
      const img=new Image();
      img.onload=()=>{ctx.drawImage(img,80,100,310,272);URL.revokeObjectURL(url);res();};
      img.onerror=()=>{URL.revokeObjectURL(url);res();};
      img.src=url;
    }catch(e){res();}
  });

  /* Archetype name — auto-scale to fit left panel ── */
  ctx.textAlign='left';
  let fs=48;ctx.font=`800 ${fs}px Sarabun,sans-serif`;
  while(ctx.measureText(arch.name).width>410&&fs>30){fs-=2;ctx.font=`800 ${fs}px Sarabun,sans-serif`;}
  ctx.fillStyle='#FFFFFF';ctx.fillText(arch.name,80,416);
  ctx.fillStyle='#C8A94A';ctx.font='600 18px Sarabun,sans-serif';
  ctx.fillText(arch.tag,80,452);

  /* Short description (2 lines max) */
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='400 15px Sarabun,sans-serif';
  const diagWords=arch.diagnosis.split(' ');let diagLine='';let diagY=482;
  for(const w of diagWords){
    const test=diagLine+(diagLine?' ':'')+w;
    if(ctx.measureText(test).width>420&&diagLine){ctx.fillText(diagLine,80,diagY);diagLine=w;diagY+=22;if(diagY>530)break;}
    else diagLine=test;
  }
  if(diagY<=530)ctx.fillText(diagLine,80,diagY);

  /* ── CENTER vertical divider ── */
  ctx.strokeStyle='rgba(200,169,74,0.18)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(530,96);ctx.lineTo(530,630);ctx.stroke();

  /* ── RIGHT: Radar spider web — center at (800,320) r=178 ── */
  drawRadarCanvas(ctx,r,800,318,178);
  ctx.textAlign='center';
  ctx.fillStyle='rgba(200,169,74,0.65)';ctx.font='700 12px Sarabun,sans-serif';
  ctx.fillText('◆  FINANCIAL RADAR  ◆',800,115);

  /* Legend */
  const dims=['เงินสำรอง','ความคุ้มครอง','กระแสเงินสด','การออม/ลงทุน','การวางแผน'];
  const vals=[r.emergency,r.protection,r.cashflow,r.savings,r.planning];
  const sc=v=>v>=70?'#52C97A':v>=40?'#C8A94A':'#E05252';
  dims.forEach((d,i)=>{
    const ly=512+i*28;
    ctx.fillStyle=sc(vals[i]);ctx.beginPath();ctx.arc(554,ly-8,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.65)';ctx.font='400 17px Sarabun,sans-serif';ctx.textAlign='left';
    ctx.fillText(d,568,ly);
    ctx.fillStyle=sc(vals[i]);ctx.font='700 17px Sarabun,sans-serif';ctx.textAlign='right';
    ctx.fillText(vals[i]+'/100',1000,ly);
  });

  /* ── Horizontal divider ── */
  ctx.strokeStyle='rgba(200,169,74,0.22)';ctx.lineWidth=1;ctx.textAlign='center';
  ctx.beginPath();ctx.moveTo(80,652);ctx.lineTo(1000,652);ctx.stroke();

  /* ── Caption ── */
  ctx.fillStyle='rgba(255,255,255,0.88)';ctx.font='italic 400 22px Sarabun,sans-serif';
  const captionEnd=wrapTextCenter(ctx,arch.caption,540,700,860,38);

  /* ── CTA box ── */
  const ctaY=Math.max(captionEnd+20,876);
  ctx.fillStyle='rgba(200,169,74,0.1)';ctx.strokeStyle='rgba(200,169,74,0.55)';ctx.lineWidth=1.5;
  rrect(ctx,80,ctaY,920,110,18);ctx.fill();ctx.stroke();
  ctx.fillStyle='#C8A94A';ctx.font='700 25px Sarabun,sans-serif';
  ctx.fillText('🔍 ลองตรวจสุขภาพการเงินของคุณได้เลย!',540,ctaY+42);
  ctx.fillStyle='rgba(255,255,255,0.55)';ctx.font='400 18px Sarabun,sans-serif';
  ctx.fillText(SURVEY_URL,540,ctaY+76);

  return C.toDataURL('image/png');
}

async function downloadShareCard(){
  const btn=document.getElementById('btn-share-card');
  if(btn){btn.textContent='⏳ กำลังสร้างรูป...';btn.disabled=true;}
  try{
    const dataUrl=await generateShareCard();
    const a=document.createElement('a');
    a.href=dataUrl;
    a.download=`S41-Archetype-${ARCH[S.archetype]?.name||'result'}.png`;
    a.click();
    if(btn){btn.textContent='✅ Download แล้ว! ไปแชร์ลง Facebook ได้เลย 🎉';btn.disabled=false;}
    setTimeout(()=>{if(btn)btn.textContent='🖼️ สร้างรูปแชร์ Archetype (PNG)';},3500);
  }catch(e){
    if(btn){btn.textContent='❌ เกิดข้อผิดพลาด ลองใหม่อีกครั้ง';btn.disabled=false;}
  }
}

async function shareToFacebook(){
  /* 1) Copy caption to clipboard */
  const arch=ARCH[S.archetype];
  const shareText=arch.caption+'\n\n🔍 ลองทำ Survey ได้เลยที่ → '+SURVEY_URL;

  const fbShare='https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(SURVEY_URL)

/* ════ ACTIONS ════ */
function startQ(){S.screen='question';S.currentQ=0;render();window.scrollTo(0,0);}

function pick(qid,choice){
  S.answers[qid]={choice};
  const q=QS[S.currentQ];
  document.querySelectorAll('.ch').forEach(btn=>{
    const m=btn.getAttribute('onclick').match(/'([ABCDE])'[^']*\)$/);
    const k=m?m[1]:null;
    btn.classList.toggle('sel',k===choice);
    const ck=btn.querySelector('.ck');
    if(ck){ck.style.background=k===choice?'var(--navy)':'';ck.style.color=k===choice?'#fff':'';}
  });
  const rxTxt=q.rxMap?q.rxMap[choice]:q.rx||'';
  const rx=document.getElementById('rx');
  if(rx&&rxTxt){rx.innerHTML=rxTxt;rx.className='rx show';}
  const nb=document.getElementById('nb');
  if(nb)setTimeout(()=>{nb.className='nb show';},200);
}

function next(){
  if(S.currentQ>=QS.length-1){
    S.radarScores=calcRadar();
    S.archetype=calcArchetype();
    S.screen='calc';render();
    setTimeout(()=>{S.screen='result';render();window.scrollTo(0,0);},2000);
  } else {
    S.currentQ++;render();window.scrollTo(0,0);
  }
}

function toggleContact(){
  S.contactOpen=!S.contactOpen;
  const b=document.getElementById('contact-body');
  const a=document.getElementById('contact-arrow');
  if(b)b.className=S.contactOpen?'contact-body open':'contact-body';
  if(a)a.textContent=S.contactOpen?'∨':'›';
}

function submitLead(){
  const name=document.getElementById('inp-name')?.value||S.contactName;
  const phone=document.getElementById('inp-phone')?.value||S.contactPhone;
  if(!name){alert('กรุณากรอกชื่อ-นามสกุลของคุณ');return;}
  if(!phone){alert('กรุณากรอกเบอร์โทรศัพท์');return;}
  S.contactName=name;S.contactPhone=phone;
  const arch=ARCH[S.archetype]||{};
  const surp=calcSurplus();
  const priorities=calcPriorities(S.radarScores||{});
  const ins=calcInsurance();
  const q1Labels={A:'ไลฟ์สไตล์และประสบการณ์',B:'ครอบครัวและคนรัก',C:'อิสรภาพทางการเงิน',D:'ส่งต่อและสร้างมรดก'};
  const q2Labels={A:'ฐาน (เงินสำรอง/ประกัน)',B:'หนี้และกระแสเงินสด',C:'การเติบโตและลงทุน',D:'ตรวจเช็กและวางแผนรวม'};
  const q12Labels={A:'🛡️ สร้างหลักประกัน',B:'💧 ลดหนี้',C:'🌱 ออมและลงทุน',D:'📊 วางแผนภาษี',E:'🎯 เป้าหมายระยะยาว'};
  const payload={
    timestamp:new Date().toISOString(),
    lead:{name,phone,line:S.contactLine},
    archetype:{key:S.archetype,name:arch.name},
    context:{
      lifeValues:q1Labels[S.answers['Q1']?.choice]||'-',
      painPoint:q2Labels[S.answers['Q2']?.choice]||'-',
    },
    fiveForces:S.radarScores,
    income:{range:INCOME_RANGE[surp.incQ],monthly:surp.income,annual:surp.income*12,taxBracket:TAX_BRACKET[surp.incQ]},
    surplus:{pctRange:SURPLUS_RANGE[surp.surQ],monthly:Math.round(surp.monthly),annual:Math.round(surp.annual)},
    priorities:priorities.slice(0,4).map((p,i)=>({rank:i+1,label:p.label,score:p.score})),
    insurance:{health:ins.health.status,life:ins.life.status,overall:ins.overall},
    customerWants:q12Labels[S.answers['Q12']?.choice]||'?',
    rawAnswers:Object.entries(S.answers).map(([q,v])=>`${q}:${v.choice}`).join(', '),
  };
  console.log('[S41 Lead v4.1]', payload);
  // TODO: Replace with webhook/API call e.g. fetch('/api/leads', {method:'POST', body:JSON.stringify(payload)})
  S.screen='thankyou';render();window.scrollTo(0,0);
}

function restart(){
  S={screen:'welcome',currentQ:0,answers:{},archetype:null,radarScores:null,contactOpen:false,contactName:'',contactPhone:'',contactLine:''};
  render();window.scrollTo(0,0);
}
